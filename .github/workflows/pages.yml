name: Deploy Mockup to GitHub Pages

# Publishes the HTML mockup to GitHub Pages so it's viewable as a live webpage.
# After the first run, the mockup is live at:
#   https://giranimo.github.io/WineMind/

on:
  push:
    branches: [ main ]
    paths:
      - 'mockup.html'
      - 'index.html'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Pages content
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp mockup.html _site/mockup.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
