# Codemagic build pipeline for WineMind iOS
# Sign up at codemagic.io, connect this repo, and the first build will run automatically.
# Set up Apple Developer credentials in Codemagic UI → Teams → Integrations → Apple Developer Portal.

workflows:
  ios-development:
    name: WineMind iOS — Dev Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - apple_credentials  # configure in Codemagic UI
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.winemind.app"
        XCODE_PROJECT: "WineMind.xcodeproj"
        XCODE_SCHEME: "WineMind"

    # Compile-check on pull requests only. Pushes to main go straight to the
    # TestFlight workflow below, so we don't double-build on every push.
    triggering:
      events:
        - pull_request
      branch_patterns:
        - pattern: "main"
          include: true

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate

      # No signing in the dev workflow — this is a pure compile/sanity check.
      # (build-ipa archives + exports an .ipa, which REQUIRES signing; signing
      #  is only set up in the TestFlight workflow below.)
      - name: Build iOS app (compile check, unsigned)
        script: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

    artifacts:
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app

    publishing:
      email:
        recipients:
          - suneheide@gmail.com
        notify:
          success: true
          failure: true

  ios-testflight:
    name: WineMind iOS — TestFlight Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: codemagic  # configure in Codemagic UI
    # NOTE: no `ios_signing:` block here on purpose. That block enables
    # Codemagic's MANAGED signing, which runs in the prepare phase and aborts
    # with "No matching profiles found" when no profile exists yet. Instead we
    # create the cert + profile ourselves in the script below.
    environment:
      groups:
        # Codemagic env-var group that must contain CERTIFICATE_PRIVATE_KEY
        # (a PEM RSA private key). app-store-connect uses it to create/reuse
        # the iOS distribution certificate. Create the group + var in the
        # Codemagic UI (see repo notes / chat for the one-time setup).
        - appstore_credentials
      xcode: latest
      vars:
        BUNDLE_ID: "com.winemind.app"
        XCODE_PROJECT: "WineMind.xcodeproj"
        XCODE_SCHEME: "WineMind"

    # Builds + uploads to TestFlight automatically on every push to main,
    # and also on explicit v* release tags. The build number is derived from
    # max(App Store latest + 1, $BUILD_NUMBER), so each push gets a unique one.
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: "main"
          include: true
      tag_patterns:
        - pattern: "v*"
          include: true

    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: xcodegen generate

      - name: Set up code signing (create cert + profile if missing)
        script: |
          # Create the build keychain FIRST, then fetch/create the App Store
          # distribution certificate + provisioning profile via the App Store
          # Connect API (no Mac / CSR required). Creating a certificate needs
          # a private key — supplied via CERTIFICATE_PRIVATE_KEY (PEM) from the
          # appstore_credentials env group; without it the build fails with
          # "Cannot save Signing Certificates without certificate private key".
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create \
            --verbose
          keychain add-certificates
          echo "--- Provisioning profiles on disk ---"
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/" || true
          echo "--- Certificates in keychain ---"
          security find-identity -v -p codesigning || true
          xcode-project use-profiles --verbose

      - name: Set unique build number
        script: |
          # The build number (CFBundleVersion) must be unique & increasing for
          # each upload of a given version, or App Store Connect rejects it with
          # "an attribute with a value that has already been used".
          # Use the higher of (App Store latest + 1) and Codemagic's monotonic
          # $BUILD_NUMBER, so we never collide with an already-uploaded build
          # even if the App Store lookup fails. (project.yml sets
          # VERSIONING_SYSTEM=apple-generic so agvtool actually applies this.)
          LATEST=$(app-store-connect get-latest-app-store-build-number "$BUNDLE_ID" 2>/dev/null || echo 0)
          if [ "$LATEST" -ge "$BUILD_NUMBER" ]; then
            NEXT=$((LATEST + 1))
          else
            NEXT=$BUILD_NUMBER
          fi
          echo "App Store latest=$LATEST, Codemagic BUILD_NUMBER=$BUILD_NUMBER -> using build $NEXT"
          agvtool new-version -all "$NEXT"
          agvtool what-version

      - name: Build signed iOS app
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        # Upload to App Store Connect only. The build is then immediately
        # available to INTERNAL testers (no Beta App Review needed).
        # External distribution requires Beta App Review + a real external
        # beta group — re-enable below once you've created one in App Store
        # Connect and you're ready for public testers:
        #   submit_to_testflight: true
        #   beta_groups:
        #     - <your external group name>
        submit_to_testflight: false
