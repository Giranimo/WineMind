# Codemagic build pipeline for WineMind iOS
# Sign up at codemagic.io, connect this repo, and the first build will run automatically.
# Set up Apple Developer credentials in Codemagic UI → Teams → Integrations → Apple Developer Portal.

workflows:
  ios-development:
    name: WineMind iOS — Dev Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - apple_credentials  # configure in Codemagic UI
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.winemind.app"
        XCODE_PROJECT: "WineMind.xcodeproj"
        XCODE_SCHEME: "WineMind"

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: "main"
          include: true

    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen

      - name: Generate Xcode project
        script: |
          xcodegen generate

      # No signing in the dev workflow — this is a pure compile/sanity check.
      # (build-ipa archives + exports an .ipa, which REQUIRES signing; signing
      #  is only set up in the TestFlight workflow below.)
      - name: Build iOS app (compile check, unsigned)
        script: |
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

    artifacts:
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app

    publishing:
      email:
        recipients:
          - suneheide@gmail.com
        notify:
          success: true
          failure: true

  ios-testflight:
    name: WineMind iOS — TestFlight Release
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: codemagic  # configure in Codemagic UI
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.winemind.app
      xcode: latest
      vars:
        BUNDLE_ID: "com.winemind.app"
        XCODE_PROJECT: "WineMind.xcodeproj"
        XCODE_SCHEME: "WineMind"

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "v*"
          include: true

    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Generate Xcode project
        script: xcodegen generate

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Increment build number
        script: |
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$BUNDLE_ID" || echo "0")
          agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))

      - name: Build signed iOS app
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - App Store Connect Users
