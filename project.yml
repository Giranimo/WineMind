# XcodeGen config — generates WineMind.xcodeproj from this YAML
# Install: brew install xcodegen
# Generate: xcodegen generate
# CI runs this automatically so no .xcodeproj needs to be committed.

name: WineMind
options:
  bundleIdPrefix: com.winemind
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "5945KAV43T"
    # Manual signing: CI fetches/creates the distribution profile via the
    # App Store Connect API and applies it with `xcode-project use-profiles`.
    CODE_SIGN_STYLE: Manual
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_PREVIEWS: "YES"
    SWIFT_EMIT_LOC_STRINGS: "YES"
    GENERATE_INFOPLIST_FILE: "NO"

targets:
  WineMind:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      # Source files live under WineMind/WineMind/. Info.plist and the
      # entitlements are excluded here so they aren't copied as resources —
      # they're wired in explicitly below. Assets.xcassets and
      # PrivacyInfo.xcprivacy are auto-included by XcodeGen as resources.
      - path: WineMind/WineMind
        excludes:
          - "Info.plist"
          - "WineMind.entitlements"
    info:
      path: WineMind/WineMind/Info.plist
    entitlements:
      path: WineMind/WineMind/WineMind.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.winemind.app
        INFOPLIST_FILE: WineMind/WineMind/Info.plist
        CODE_SIGN_ENTITLEMENTS: WineMind/WineMind/WineMind.entitlements
        TARGETED_DEVICE_FAMILY: "1"  # iPhone only
        SUPPORTS_MACCATALYST: "NO"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    dependencies: []
    capabilities:
      - SignInWithApple
      - iCloud:
          - CloudKit
