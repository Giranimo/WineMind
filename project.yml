# XcodeGen config — generates WineMind.xcodeproj from this YAML
# Install: brew install xcodegen
# Generate: xcodegen generate
# CI runs this automatically so no .xcodeproj needs to be committed.

name: WineMind
options:
  bundleIdPrefix: com.winemind
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "" # set in CI via codemagic.yaml / GitHub Actions
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_PREVIEWS: "YES"
    SWIFT_EMIT_LOC_STRINGS: "YES"
    GENERATE_INFOPLIST_FILE: "NO"

targets:
  WineMind:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WineMind
        excludes:
          - "Info.plist"
          - "WineMind.entitlements"
    resources:
      - path: WineMind/Assets.xcassets
      - path: WineMind/PrivacyInfo.xcprivacy
    info:
      path: WineMind/Info.plist
    entitlements:
      path: WineMind/WineMind.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.winemind.app
        INFOPLIST_FILE: WineMind/Info.plist
        CODE_SIGN_ENTITLEMENTS: WineMind/WineMind.entitlements
        TARGETED_DEVICE_FAMILY: "1"  # iPhone only
        SUPPORTS_MACCATALYST: "NO"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    dependencies: []
    capabilities:
      - SignInWithApple
      - iCloud:
          - CloudKit
